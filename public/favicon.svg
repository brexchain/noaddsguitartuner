<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Dark glossy background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#2D1A0F" />
      <stop offset="100%" stop-color="#0F0804" />
    </radialGradient>
    
    <!-- Gold / Amber gradient for premium guitar feel -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>

    <!-- Silver / steel gradient for guitar strings -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Circular background frame mimicking a premium vintage acoustic soundhole/rosette -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="12" filter="url(#shadow)" />
  <circle cx="256" cy="256" r="216" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="8 6" opacity="0.6" />

  <!-- Guitar Silhouette in gold/amber -->
  <g transform="translate(256, 250) scale(0.9)">
    <!-- Guitar Body Outline (Acoustic Curve) -->
    <path d="M-110,80 C-150,150 -130,220 -80,240 C-30,250 30,250 80,240 C130,220 150,150 110,80 C90,40 50,35 60,0 C70,-40 100,-70 80,-140 C60,-215 -60,-215 -80,-140 C-100,-70 -70,-40 -60,0 C-50,35 -90,40 -110,80 Z" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linejoin="round" opacity="0.3" />

    <!-- Stylized central Neck going up -->
    <rect x="-18" y="-240" width="36" height="380" fill="#3D1D0B" stroke="url(#goldGrad)" stroke-width="4" rx="4" />
    
    <!-- Fret markers in gold -->
    <line x1="-18" y1="-200" x2="18" y2="-200" stroke="url(#goldGrad)" stroke-width="3" />
    <line x1="-18" y1="-150" x2="18" y2="-150" stroke="url(#goldGrad)" stroke-width="3" />
    <line x1="-18" y1="-100" x2="18" y2="-100" stroke="url(#goldGrad)" stroke-width="3" />
    <line x1="-18" y1="-50" x2="18" y2="-50" stroke="url(#goldGrad)" stroke-width="3" />
    <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#goldGrad)" stroke-width="3" />
    <line x1="-18" y1="50" x2="18" y2="50" stroke="url(#goldGrad)" stroke-width="3" />
    <line x1="-18" y1="100" x2="18" y2="100" stroke="url(#goldGrad)" stroke-width="3" />

    <!-- Cute little fretboard inlay dots -->
    <circle cx="0" cy="-175" r="4" fill="#FBBF24" />
    <circle cx="0" cy="-75" r="4" fill="#FBBF24" />
    <circle cx="0" cy="25" r="4" fill="#FBBF24" />

    <!-- Soundhole rosette circle at neck base -->
    <circle cx="0" cy="140" r="45" fill="#000" stroke="url(#goldGrad)" stroke-width="6" />
    <circle cx="0" cy="140" r="35" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="4 3" opacity="0.8" />
    
    <!-- Golden Tuning pegs at top (Headstock silhouette) -->
    <path d="M-22,-240 L22,-240 L28,-360 L0,-380 L-28,-360 Z" fill="#1C0D05" stroke="url(#goldGrad)" stroke-width="4" />
    <path d="M0,-355 L0,-250" stroke="url(#goldGrad)" stroke-width="2" opacity="0.3" />
    
    <!-- 6 Tuning pegs (3 left, 3 right) styled with knobs -->
    <!-- Left pegs -->
    <path d="M-25,-335 L-42,-335" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="-42" cy="-335" r="6" fill="url(#goldGrad)" />
    <path d="M-26,-295 L-42,-295" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="-42" cy="-295" r="6" fill="url(#goldGrad)" />
    <path d="M-27,-255 L-42,-255" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="-42" cy="-255" r="6" fill="url(#goldGrad)" />

    <!-- Right pegs -->
    <path d="M25,-335 L42,-335" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="42" cy="-335" r="6" fill="url(#goldGrad)" />
    <path d="M26,-295 L42,-295" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="42" cy="-295" r="6" fill="url(#goldGrad)" />
    <path d="M27,-255 L42,-255" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="42" cy="-255" r="6" fill="url(#goldGrad)" />

    <!-- 6 Silver Strings spanning down -->
    <line x1="-12" y1="-370" x2="-12" y2="140" stroke="url(#silverGrad)" stroke-width="1.2" opacity="0.85" />
    <line x1="-7" y1="-370" x2="-7" y2="140" stroke="url(#silverGrad)" stroke-width="1.5" opacity="0.85" />
    <line x1="-2" y1="-370" x2="-2" y2="140" stroke="url(#silverGrad)" stroke-width="1.8" opacity="0.85" />
    <line x1="3" y1="-370" x2="3" y2="140" stroke="url(#silverGrad)" stroke-width="2.1" opacity="0.85" />
    <line x1="8" y1="-370" x2="8" y2="140" stroke="url(#silverGrad)" stroke-width="2.4" opacity="0.85" />
    <line x1="13" y1="-370" x2="13" y2="140" stroke="url(#silverGrad)" stroke-width="2.7" opacity="0.85" />
    
    <!-- Elegant gold vibration wave graphic surrounding soundhole to hint at tuning/sound waves -->
    <path d="M-80,140 A80,80 0 0,0 -40,210" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    <path d="M80,140 A80,80 0 0,1 40,210" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    <path d="M-100,140 A100,100 0 0,0 -50,225" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" opacity="0.25" />
    <path d="M100,140 A100,100 0 0,1 50,225" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" opacity="0.25" />
  </g>
</svg>
